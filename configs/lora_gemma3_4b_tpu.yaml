seed: 42

# SMOKE-TEST CONFIG.  Same hyperparams as lora_medgemma27b_tpu.yaml (so the
# pipeline LOGIC is exercised identically) but on a 4B base instead of 27B.
# Purpose: validate end-to-end pipeline (download → SPMD shard → compile →
# generate → grade → train → eval) in 3-4 hours instead of 12+.  After this
# greens, swap back to lora_medgemma27b_tpu.yaml for the real run.
#
# Memory budget on v6e-8 (8 chips × 32 GB = 256 GB):
#   Running in REPLICATED mode (mark_sharding disabled to avoid XLA fusion crash
#   on <=8B models), so each chip must hold the full computation.
#   Per-chip budget: 31.25 GB.  At seq=512, batch=1 the program fits comfortably
#   (~10-12 GB).  At seq=4096, batch=2 it blew 148 GB -- 5x over limit.

model:
  name: google/gemma-3-4b-it
  torch_dtype: bfloat16
  quantization: null

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: CAUSAL_LM
  variant: standard

training:
  num_epochs: 3
  per_device_train_batch_size: 1         # replicated mode: full model per chip
  gradient_accumulation_steps: 64        # keep effective batch = 64
  learning_rate: 1.0e-4
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  max_seq_length: 512                    # fits per-chip HBM in replicated mode
  logging_steps: 10
  save_strategy: epoch
  eval_strategy: epoch
  bf16: true

data:
  train_file: data/sft/train.jsonl
  val_file: data/sft/val.jsonl
  eval_sample_ids: data/raw/hard_200_sample_ids.json
