seed: 42

model:
  name: google/medgemma-27b-text-it
  torch_dtype: bfloat16
  # quantization: null   # default, full-precision LoRA
  # quantization: 4bit   # QLoRA: NF4 weights with bf16 compute, double-quant
  # quantization: 8bit   # 8-bit quantized (less memory savings than 4bit)
  quantization: null

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: CAUSAL_LM
  # variant: standard    # default, classic LoRA (A@B low-rank update)
  # variant: dora        # DoRA: decomposed direction + magnitude. Not compatible with 4bit/8bit.
  # variant: rslora      # rsLoRA: alpha/sqrt(r) scaling, better at higher r.
  variant: standard

training:
  num_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  max_seq_length: 4096
  logging_steps: 10
  save_strategy: epoch
  eval_strategy: epoch
  bf16: true

data:
  train_file: data/sft/train.jsonl
  val_file: data/sft/val.jsonl
  eval_sample_ids: data/raw/hard_200_sample_ids.json
