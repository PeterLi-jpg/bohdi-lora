seed: 42

model:
  name: google/medgemma-27b-text-it
  torch_dtype: bfloat16
  # bitsandbytes (4bit/8bit QLoRA) is CUDA-only and doesn't run on TPU.
  # v6e-8 = 256 GB total HBM — MedGemma-27B (54 GB bfloat16) fits with plenty of room.
  quantization: null

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: CAUSAL_LM
  variant: standard

training:
  num_epochs: 3
  # per_device batch applies per chip. effective batch = per_device * num_chips * grad_accum.
  # v6e-8:  8 *  8 * 4 =  256    v4-32: 8 * 32 * 4 = 1024    v6e-64: 8 * 64 * 4 = 2048
  # num_chips is set by the accelerate config (accelerate_config_v6e8.yaml, v4_32.yaml, etc).
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-4
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  max_seq_length: 4096
  logging_steps: 10
  save_strategy: epoch
  eval_strategy: epoch
  bf16: true

data:
  train_file: data/sft/train.jsonl
  val_file: data/sft/val.jsonl
  eval_sample_ids: data/raw/hard_200_sample_ids.json
