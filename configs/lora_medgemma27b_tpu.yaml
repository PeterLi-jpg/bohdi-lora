seed: 42

model:
  name: google/medgemma-27b-text-it
  torch_dtype: bfloat16
  # bitsandbytes (4bit/8bit QLoRA) is CUDA-only and doesn't run on TPU.
  # v6e-8 = 256 GB total HBM — MedGemma-27B (54 GB bfloat16) fits with plenty of room.
  quantization: null

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: CAUSAL_LM
  variant: standard

training:
  num_epochs: 3
  # NOTE on v6e-8 + SPMD (num_processes: 1 in tpu/accelerate_config_v6e8.yaml):
  # there's only ONE Python process driving all 8 chips, so per_device_train_
  # batch_size is the batch for the WHOLE 8-chip program, NOT per chip.
  # Effective batch = per_device * grad_accum (no num_processes multiplier).
  #
  # Memory per chip with model sharded 8-ways (~6.75 GB) + activations
  # (replicated, since we don't shard the batch dim):
  #   batch=2, seq=4096  → ~8-12 GB activations with grad-ckpt → fits in 32 GB
  #   batch=4, seq=4096  → ~16-22 GB → tight, risk of OOM
  # Keep batch small, push effective batch up via grad_accum.
  #
  # On non-TPU (multi-GPU), per_device is per-GPU and num_processes scales it.
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 32        # effective batch = 64
  learning_rate: 1.0e-4
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  max_seq_length: 4096
  # Gradient checkpointing is required to fit activations per-chip in replicated
  # SPMD mode.  use_reentrant=False avoids the "torch has no attribute 'xla'"
  # error from the legacy reentrant path on TPU.
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  logging_steps: 10
  save_strategy: epoch
  eval_strategy: epoch
  bf16: true

data:
  train_file: data/sft/train.jsonl
  val_file: data/sft/val.jsonl
  eval_sample_ids: data/raw/hard_200_sample_ids.json
